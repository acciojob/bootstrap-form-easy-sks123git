<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <title>Internship Form</title>
  </head>
  <body>
    <div class="container py-4">
      <div class="col-sm-12 text-center mb-4">
        <h1>Insternship Form</h1>
      </div>
      <form class="needs-validation" novalidate>
        <div class="row g-3 mb-3">
          <div class="col-sm-4">
            <label for="first-name-input" class="form-label">First Name</label>
            <input
              type="text"
              class="form-control"
              name="firstName"
              id="first-name-input"
              required
            />
            <div class="invalid-feedback">Please enter your first name.</div>
          </div>
          <div class="col-sm-4">
            <label for="last-name-input" class="form-label">Last Name</label>
            <input
              type="text"
              class="form-control"
              name="lastName"
              id="last-name-input"
              required
            />
            <div class="invalid-feedback">Please enter your last name.</div>
          </div>
          <div class="col-sm-4">
            <label for="email-input" class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control"
              name="email"
              id="email-input"
              required
            />
            <div class="invalid-feedback">
              Please enter a valid email address.
            </div>
          </div>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label for="college-input" class="form-label">College</label>
            <input
              type="text"
              class="form-control"
              name="college"
              id="college-input"
              required
            />
            <div class="invalid-feedback">Please enter your college name.</div>
          </div>
          <div class="col-sm-3">
            <label for="grad-year-select" class="form-label"
              >Graduation Year</label
            >
            <select
              class="form-select"
              id="grad-year-select"
              name="graduationYear"
              required
            >
              <option value="" selected disabled>Choose Year</option>
              <option value="2020">2020</option>
              <option value="2021">2021</option>
              <option value="2022">2022</option>
              <option value="2023">2023</option>
            </select>
            <div class="invalid-feedback">Please select a graduation year.</div>
          </div>
          <div class="col-sm-3">
            <label for="roll-no-input" class="form-label">Roll No.</label>
            <input
              type="text"
              class="form-control"
              name="rollNo"
              id="roll-no-input"
              min="1"
              required
            />
            <div class="invalid-feedback">Please enter your roll number.</div>
          </div>
        </div>
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            name="conditions-checkbox"
            id="conditions-checkbox"
            required
          />
          <label class="form-check-label" for="conditions-checkbox">
            Agree to terms and conditions
          </label>
          <div class="invalid-feedback">
            You must agree to the terms and conditions before submitting.
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Submit form</button>
      </form>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
    <script>
      (function () {
        const form = document.querySelector(".needs-validation");
        form.addEventListener(
          "submit",
          function (event) {
            if (!form.checkValidity()) {
              event.preventDefault();
              event.stopPropagation();
            }
            form.classList.add("was-validated");
          },
          false,
        );
      })();
    </script>
  </body>
</html>
